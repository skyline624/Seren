server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy WebSocket to Seren API
    location /ws {
        proxy_pass http://seren-api:5000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Proxy REST API to Seren API
    location /api/ {
        proxy_pass http://seren-api:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy health checks
    location /health/ {
        proxy_pass http://seren-api:5000/health/;
        proxy_set_header Host $host;
    }

    # Cache static assets
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Cache avatar assets aggressively
    location ~* \.(vrm|glb|gltf)$ {
        expires 90d;
        add_header Cache-Control "public, immutable";
    }
}
