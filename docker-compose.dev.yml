# =============================================================================
# docker-compose.dev.yml — Seren local test stack (direct Ollama, no OpenClaw)
# =============================================================================
# Usage:
#   docker compose -f docker-compose.dev.yml up --build
#   Open http://localhost:8080
#
# Prerequisites:
#   - Ollama running on the host (port 11434)
#   - At least one chat model available (e.g. glm-5.1:cloud)
#
# Change model:
#   OLLAMA_MODEL=qwen3.5:cloud docker compose -f docker-compose.dev.yml up --build
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Seren Hub API (.NET 10)
  # ---------------------------------------------------------------------------
  seren-api:
    build:
      context: .
      dockerfile: src/server/Seren.Server.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__SerenDb=Data Source=/data/seren.db
      - Seren__WebSocket__Path=/ws
      - Seren__WebSocket__KeepAliveIntervalSeconds=15
      - Seren__WebSocket__ReadTimeoutSeconds=120
      # Point directly to Ollama on the host (no OpenClaw)
      - OpenClaw__BaseUrl=http://host.docker.internal:11434
      - OpenClaw__AuthToken=
      - OpenClaw__DefaultAgentId=${OLLAMA_MODEL:-glm-5.1:cloud}
      # Auth disabled for local testing
      - Auth__RequireAuthentication=false
      - Auth__JwtSecret=
      # CORS: allow the web frontend
      - Seren__Cors__AllowedOrigins__0=http://localhost:9080
      - Seren__RateLimit__Enabled=false
    volumes:
      - seren_data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ---------------------------------------------------------------------------
  # Seren Web (Vue 3 + nginx reverse proxy)
  # ---------------------------------------------------------------------------
  seren-web:
    build:
      context: ./src/ui
      dockerfile: apps/seren-web/Dockerfile
    ports:
      - "9080:80"
    depends_on:
      - seren-api

volumes:
  seren_data:
