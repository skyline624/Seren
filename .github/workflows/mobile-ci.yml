name: mobile-ci

on:
  push:
    branches: [main, master]
    paths:
      - 'src/ui/apps/seren-mobile/**'
      - 'src/ui/packages/**'
      - 'src/ui/pnpm-workspace.yaml'
      - 'src/ui/package.json'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    paths:
      - 'src/ui/apps/seren-mobile/**'
      - 'src/ui/packages/**'
      - 'src/ui/pnpm-workspace.yaml'
      - 'src/ui/package.json'
      - '.github/workflows/mobile-ci.yml'

permissions:
  contents: read

jobs:
  android-build:
    name: Android (Gradle)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: src/ui/pnpm-lock.yaml

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: src/ui

      - name: Build workspace packages
        run: pnpm build:packages
        working-directory: src/ui

      - name: Build web assets
        run: pnpm --filter @seren/mobile build
        working-directory: src/ui

      - name: Capacitor sync Android
        run: pnpm --filter @seren/mobile exec cap add android || true
        working-directory: src/ui

      - name: Capacitor copy
        run: pnpm --filter @seren/mobile exec cap sync android
        working-directory: src/ui

      - name: Assemble debug APK
        run: ./gradlew assembleDebug
        working-directory: src/ui/apps/seren-mobile/android
        continue-on-error: true

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seren-mobile-android-debug
          path: src/ui/apps/seren-mobile/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

  ios-build:
    name: iOS (Xcode)
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: src/ui/pnpm-lock.yaml

      - name: Setup CocoaPods cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cocoapods
            ~/Library/Caches/CocoaPods
          key: pods-${{ runner.os }}-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: src/ui

      - name: Build workspace packages
        run: pnpm build:packages
        working-directory: src/ui

      - name: Build web assets
        run: pnpm --filter @seren/mobile build
        working-directory: src/ui

      - name: Capacitor add iOS
        run: pnpm --filter @seren/mobile exec cap add ios || true
        working-directory: src/ui

      - name: Capacitor sync
        run: pnpm --filter @seren/mobile exec cap sync ios
        working-directory: src/ui

      - name: xcodebuild simulator build
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build
        working-directory: src/ui/apps/seren-mobile/ios/App
        continue-on-error: true

      - name: Upload app bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seren-mobile-ios-debug
          path: src/ui/apps/seren-mobile/ios/App/build/Build/Products/Debug-iphonesimulator/*.app
          if-no-files-found: warn
