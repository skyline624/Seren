# =============================================================================
# docker-compose.yml — Seren full stack (OpenClaw + Hub API + Web UI)
# =============================================================================
# Usage:
#   cp .env.example .env    # fill in OPENCLAW_GATEWAY_TOKEN and optional LLM keys
#   docker compose up -d --build
#
# All three services start together. OpenClaw owns the LLM transcripts;
# Seren is a thin multi-surface coordinator on top of it. Reload-safe:
# the `seren_data` and `openclaw_workspace` volumes keep `characters.json`
# and session transcripts across `docker compose down` (without `-v`).
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # One-shot init: Docker named volumes are owned by root:root on creation,
  # but OpenClaw runs as uid 1000 (node user). Chown the state volume before
  # openclaw boots so it can create `agents/`, `workspace/`, `canvas/`, etc.
  # ---------------------------------------------------------------------------
  openclaw-init:
    image: busybox:latest
    # Chown the state volume (openclaw runs as uid 1000). The volume now
    # also stores OpenClaw's config (the host bind-mount of openclaw.json
    # was removed once Seren stopped writing it directly — the gateway
    # owns its own config under /home/node/.openclaw).
    command:
      - "sh"
      - "-c"
      - |
        chown -R 1000:1000 /state \
          && chmod -R u+rwX /state \
          && chmod o+x /state \
          && mkdir -p /state/workspace \
          && chmod 777 /state/workspace
    volumes:
      - openclaw_state:/state
    restart: "no"

  # ---------------------------------------------------------------------------
  # vLLM — local OpenAI-compatible LLM server. Replaces Ollama (removed
  # 2026-04-30) because Ollama 0.22's auto-thinking parser routes reasoning
  # tokens to a `thinking` field that OpenClaw doesn't read, causing idle
  # watchdog timeouts on Qwen3.6 / Gemma4 / DeepSeek-R1. vLLM streams the
  # raw `<think>...</think>` inline in `delta.content`, which Seren filters
  # via LlmThinkingFilter — same UX as the cloud models that used to work.
  # ---------------------------------------------------------------------------
  vllm:
    image: vllm/vllm-openai:latest
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      # Tell vLLM where the model checkpoint lives inside the container —
      # the bind below mounts the volume populated by the one-shot HF pull.
      HUGGING_FACE_HUB_TOKEN: "${HF_TOKEN:-}"
      # Quieter logs by default; bump to `info` for tuning sessions.
      VLLM_LOGGING_LEVEL: "${VLLM_LOG_LEVEL:-WARNING}"
    command:
      - "--model"
      - "/models/Qwen3.6-27B-AWQ-INT4"
      - "--served-model-name"
      - "Qwen3.6-27B-AWQ-INT4"
      # AWQ-INT4 quant via compressed-tensors — vLLM auto-detects from the
      # model's config.json, no need for --quantization.
      - "--max-model-len"
      - "8192"
      - "--gpu-memory-utilization"
      - "0.85"
      # fp8 KV cache: ~½ the VRAM footprint of fp16. Combined with
      # max-model-len=8192, this gives ample headroom on a 24GB card
      # whose VRAM thermals are unmonitored (Zotac 3090, no memory temp sensor).
      - "--kv-cache-dtype"
      - "fp8"
      # Trust remote code only for known-safe models from a vetted volume.
      - "--trust-remote-code"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
    ports:
      - "127.0.0.1:8001:8000"   # host-side debug only (OpenClaw hits vllm:8000 via the docker network); 8000 is taken by sillytavern
    volumes:
      # Read-only is fine: vLLM only loads the safetensors. The volume is
      # populated out-of-band via a one-shot `huggingface-cli download`
      # container — see docs/llm-vllm-deployment.md.
      - vllm_models:/models:ro
      # Shared memory for tensor parallelism IPC. Required by vLLM even on
      # single-GPU because of its CUDA graph capture; default 64 MB is too
      # small and triggers `bus error` on long contexts.
      - /dev/shm:/dev/shm
    shm_size: "8g"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "curl -fsS http://localhost:8000/v1/models > /dev/null || exit 1"
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 240s   # cold-load can take 2-4 min for a 27B AWQ
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # OpenClaw Gateway — owns LLM routing, chat history and agent lifecycle.
  # ---------------------------------------------------------------------------
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest   # pin to a specific tag in prod (e.g. :2026.2.26)
    environment:
      OPENCLAW_GATEWAY_PORT: "18789"
      OPENCLAW_GATEWAY_TOKEN: "${OPENCLAW_GATEWAY_TOKEN:?set OPENCLAW_GATEWAY_TOKEN in .env}"
      # Config + state both live under /home/node/.openclaw, the writable
      # named volume owned by the node user (uid 1000). The gateway owns
      # its own config now that Seren mutates it via the `config.patch`
      # WebSocket RPC instead of direct file writes.
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      # Default LLM is now served by the local vLLM container (see below).
      # The provider id `vllm` matches the entry added at runtime via
      # config.patch RPC to OpenClaw — see docs/llm-vllm-deployment.md.
      OPENCLAW_DEFAULT_MODEL: "${OPENCLAW_DEFAULT_MODEL:-vllm/Qwen3.6-27B-AWQ-INT4}"
      # Provider credentials — leave blank in .env to leave a provider dormant.
      # Ollama removed 2026-04-30 in favour of vLLM (see vllm service below);
      # the env var is kept commented for emergency rollback only.
      # OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    ports:
      - "18789:18789"
    volumes:
      # Single source of truth for OpenClaw config + state — kept in a
      # named volume so OpenClaw's atomic writes (config.patch, plugin
      # auto-enable, etc.) work without fighting a host bind-mount, and
      # so the config persists across container rebuilds.
      - openclaw_state:/home/node/.openclaw
    depends_on:
      openclaw-init:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "node -e \"require('http').get('http://localhost:18789/v1/models',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 15s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Seren Hub API (.NET 10) — WebSocket hub, /api endpoints, character store.
  # ---------------------------------------------------------------------------
  seren-api:
    build:
      context: .                         # repo root — Dockerfile expects this
      dockerfile: src/server/Seren.Server.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      OpenClaw__BaseUrl: http://openclaw:18789
      OpenClaw__AuthToken: "${OPENCLAW_AUTH_TOKEN:-${OPENCLAW_GATEWAY_TOKEN}}"
      # One-shot pairing token; consumed on the very first handshake to
      # auto-approve Seren's Ed25519 identity. Leave unset after the device
      # is paired (harmless if left).
      OpenClaw__BootstrapToken: "${OPENCLAW_BOOTSTRAP_TOKEN:-}"
      # Persistent device identity — stored in the seren_data volume so the
      # keypair survives container rebuilds.
      OpenClaw__DeviceIdentityPath: /data/seren-device-identity.json
      OpenClaw__DefaultAgentId: "${DEFAULT_AGENT_ID:-vllm/Qwen3.6-27B-AWQ-INT4}"
      # OpenClaw workspace directory (mounted rw below). When non-empty,
      # Seren rewrites IDENTITY.md + SOUL.md here on character activation
      # so the active persona drives the LLM on the next chat.send.
      OpenClaw__WorkspacePath: /openclaw-state/workspace
      Seren__Characters__StorePath: /data/characters.json
      Auth__RequireAuthentication: "false"
      Auth__JwtSecret: "${JWT_SECRET:-change-me-in-production}"
      Seren__Cors__AllowedOrigins__0: http://localhost:9080
      Seren__RateLimit__Enabled: "false"
      # Chat attachments travel inline as base64 in the WebSocket envelope
      # (5 MB max per attachment, 20 MB total, so ~27 MB base64 + overhead).
      # Override with a larger value only if you raise AttachmentConstraints
      # server-side in lockstep.
      Seren__WebSocket__MaxMessageSize: "26214400"
      # ── VoxMind voice module ────────────────────────────────────────────────
      # Local Parakeet STT + F5-TTS engines. The volume `voxmind_models` is
      # populated out-of-band (cf. docs/15-voxmind-deployment.md) — when empty,
      # both providers no-op silently and AudioModule's NoOp/OpenAI fallback
      # stays in charge.
      Modules__voxmind__Enabled: "true"
      Modules__voxmind__DefaultLanguage: "fr"
      # STT — multi-engine router (parakeet + whisper). Each user picks the
      # active engine via @seren/module-voxmind UI tab; per-request override
      # carried in VoiceInputPayload.sttEngine. Server falls back to
      # DefaultEngine when no hint is supplied.
      Modules__voxmind__Stt__DefaultEngine: "parakeet"
      Modules__voxmind__Stt__MaxChunkSeconds: "12"
      Modules__voxmind__Stt__Parakeet__ModelDir: /data/voxmind/models/parakeet
      # Model manager root: /data/voxmind/models/whisper-{tiny,base,small,
      # medium,large}/ — populated by the Settings UI download button or
      # pre-staged via `huggingface-cli` (cf. docs/17-voxmind-deployment.md).
      Modules__voxmind__Stt__Whisper__RootDir: /data/voxmind/models
      # Whisper.ModelDir is empty by default — the engine derives the dir
      # from RootDir + ModelSize (or the `whisper-{size}` engineHint
      # received per request). Set ModelDir explicitly only to pin a
      # legacy bundle layout that doesn't follow the {RootDir}/whisper-*
      # convention.
      Modules__voxmind__Stt__Whisper__ModelDir: ""
      Modules__voxmind__Stt__Whisper__ModelSize: "small"
      Modules__voxmind__Tts__FlowMatchingSteps: "32"
      Modules__voxmind__Tts__CacheCapacity: "2"
      # FR checkpoint (override the paths if you ship a different layout):
      Modules__voxmind__Tts__Languages__fr__Language: "fr"
      Modules__voxmind__Tts__Languages__fr__PreprocessModelPath: /data/voxmind/models/f5-tts/fr/F5_Preprocess.onnx
      Modules__voxmind__Tts__Languages__fr__TransformerModelPath: /data/voxmind/models/f5-tts/fr/F5_Transformer.onnx
      Modules__voxmind__Tts__Languages__fr__DecodeModelPath: /data/voxmind/models/f5-tts/fr/F5_Decode.onnx
      Modules__voxmind__Tts__Languages__fr__TokensPath: /data/voxmind/models/f5-tts/fr/tokens.txt
      Modules__voxmind__Tts__Languages__fr__DefaultReferenceWav: /data/voxmind/models/f5-tts/fr/reference.wav
      Modules__voxmind__Tts__Languages__fr__DefaultReferenceText: ""
      # EN checkpoint (mirror of fr, override per layout):
      Modules__voxmind__Tts__Languages__en__Language: "en"
      Modules__voxmind__Tts__Languages__en__PreprocessModelPath: /data/voxmind/models/f5-tts/en/F5_Preprocess.onnx
      Modules__voxmind__Tts__Languages__en__TransformerModelPath: /data/voxmind/models/f5-tts/en/F5_Transformer.onnx
      Modules__voxmind__Tts__Languages__en__DecodeModelPath: /data/voxmind/models/f5-tts/en/F5_Decode.onnx
      Modules__voxmind__Tts__Languages__en__TokensPath: /data/voxmind/models/f5-tts/en/tokens.txt
      Modules__voxmind__Tts__Languages__en__DefaultReferenceWav: /data/voxmind/models/f5-tts/en/reference.wav
      Modules__voxmind__Tts__Languages__en__DefaultReferenceText: ""
      # Speaker recognition (3D-Speaker ERes2Net + SQLite + .bin
      # blobs). Disabled-by-default for new clusters in case the
      # operator hasn't deployed the model yet — flip to "true" once
      # the bundle is on the voxmind_speakers volume.
      Modules__voxmind__Speakers__Enabled: "true"
      Modules__voxmind__Speakers__ModelPath: /data/voxmind/speakers/models/3dspeaker_eres2net_base_16k.onnx
      Modules__voxmind__Speakers__DbPath: /data/voxmind/speakers/speakers.db
      Modules__voxmind__Speakers__EmbeddingsDir: /data/voxmind/speakers/embeddings
      Modules__voxmind__Speakers__ConfidenceThreshold: "0.65"
      Modules__voxmind__Speakers__MinAudioDurationSec: "1.5"
      Modules__voxmind__Speakers__AutoEnrolNamePrefix: "Speaker_"
      Modules__voxmind__Speakers__NumThreads: "1"
    extra_hosts:
      # Kept so future Seren-side outbound calls can reach the host on
      # Linux via `host.docker.internal` (Mac/Windows resolve this for
      # free). Mirrors the mapping on the openclaw service.
      - "host.docker.internal:host-gateway"
    ports:
      - "5080:5000"
    volumes:
      - seren_data:/data
      # Share the OpenClaw state volume (rw) so Seren can rewrite the
      # workspace persona files (IDENTITY.md + SOUL.md) on character
      # activation. OpenClaw re-reads these files on every chat.send
      # via mtime-based cache invalidation — no restart needed.
      # NOTE: persona feature is on standby (UI tab shows "Coming soon");
      # this mount can be removed once the workspace writer is migrated to
      # OpenClaw's `agents.files.set` RPC.
      - openclaw_state:/openclaw-state
      # VoxMind ONNX model bundles (Parakeet STT + F5-TTS per language +
      # Whisper variants). Mounted read-write so the model manager can
      # download new Whisper bundles directly into /data/voxmind/models/
      # whisper-{tiny,base,small,medium,large}/ from the Settings UI.
      # Out-of-band pre-deployment (cf. docs/17-voxmind-deployment.md)
      # remains supported — variants found on disk show up as already
      # downloaded.
      - voxmind_models:/data/voxmind/models
      # Speaker recognition — hybrid SQLite + on-disk embeddings layout.
      # The 3D-Speaker ERes2Net ONNX is dropped under models/, the
      # SQLite metadata DB is created on first boot via EF Core
      # migrations, and the per-profile float vectors live as `.bin`
      # blobs under embeddings/<profile-id>/. Pre-deployment via the
      # `huggingface-cli download` snippet documented in
      # docs/17-voxmind-deployment.md (Speaker recognition section).
      - voxmind_speakers:/data/voxmind/speakers
    depends_on:
      openclaw:
        condition: service_healthy
      openclaw-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5000/health/live >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Seren Web (Vue 3 + nginx) — UI served on port 9080.
  # ---------------------------------------------------------------------------
  seren-web:
    build:
      context: ./src/ui
      dockerfile: apps/seren-web/Dockerfile
    ports:
      - "9080:80"
    depends_on:
      - seren-api
    restart: unless-stopped

volumes:
  seren_data:
  openclaw_state:
  voxmind_models:
  # Speaker-recognition state (SQLite metadata + per-profile `.bin`
  # embedding blobs + the 3D-Speaker ONNX model). Pre-populated
  # out-of-band: see docs/17-voxmind-deployment.md "Speaker recognition".
  voxmind_speakers:
  # Houses the HF safetensors checkpoint served by the vllm container.
  # Populated out-of-band via:
  #   docker run --rm -v vllm_models:/models python:3.11-slim sh -c \
  #     "pip install -U huggingface_hub hf_transfer \
  #     && huggingface-cli download cyankiwi/Qwen3.6-27B-AWQ-INT4 \
  #        --local-dir /models/Qwen3.6-27B-AWQ-INT4"
  vllm_models:
    external: true   # created manually so the one-shot pull above can populate
                     # it before `docker compose up` brings vllm online.
