# =============================================================================
# docker-compose.yml — Seren full stack (OpenClaw + Hub API + Web UI)
# =============================================================================
# Usage:
#   cp .env.example .env    # fill in OPENCLAW_GATEWAY_TOKEN and optional LLM keys
#   docker compose up -d --build
#
# All three services start together. OpenClaw owns the LLM transcripts;
# Seren is a thin multi-surface coordinator on top of it. Reload-safe:
# the `seren_data` and `openclaw_workspace` volumes keep `characters.json`
# and session transcripts across `docker compose down` (without `-v`).
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # One-shot init: Docker named volumes are owned by root:root on creation,
  # but OpenClaw runs as uid 1000 (node user). Chown the state volume before
  # openclaw boots so it can create `agents/`, `workspace/`, `canvas/`, etc.
  # ---------------------------------------------------------------------------
  openclaw-init:
    image: busybox:latest
    command: ["sh", "-c", "chown -R 1000:1000 /state && chmod -R u+rwX /state"]
    volumes:
      - openclaw_state:/state
    restart: "no"

  # ---------------------------------------------------------------------------
  # OpenClaw Gateway — owns LLM routing, chat history and agent lifecycle.
  # ---------------------------------------------------------------------------
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest   # pin to a specific tag in prod (e.g. :2026.2.26)
    environment:
      OPENCLAW_GATEWAY_PORT: "18789"
      OPENCLAW_GATEWAY_TOKEN: "${OPENCLAW_GATEWAY_TOKEN:?set OPENCLAW_GATEWAY_TOKEN in .env}"
      # Config lives at a stable read-only path; state (canvas, seed writes,
      # session cache) goes under /home/node/.openclaw which is a writable
      # named volume owned by the node user (uid 1000).
      OPENCLAW_CONFIG_PATH: /etc/openclaw/openclaw.json
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_DEFAULT_MODEL: "${OPENCLAW_DEFAULT_MODEL:-lmstudio/local-model}"
      # Provider credentials — leave blank in .env to leave a provider dormant.
      LMSTUDIO_BASE_URL: "${LMSTUDIO_BASE_URL:-http://host.docker.internal:1234/v1}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    ports:
      - "18789:18789"
    volumes:
      - ./ops/openclaw/openclaw.json:/etc/openclaw/openclaw.json:ro
      - openclaw_state:/home/node/.openclaw
    depends_on:
      openclaw-init:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "node -e \"require('http').get('http://localhost:18789/v1/models',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 15s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Seren Hub API (.NET 10) — WebSocket hub, /api endpoints, character store.
  # ---------------------------------------------------------------------------
  seren-api:
    build:
      context: .                         # repo root — Dockerfile expects this
      dockerfile: src/server/Seren.Server.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      OpenClaw__BaseUrl: http://openclaw:18789
      OpenClaw__AuthToken: "${OPENCLAW_AUTH_TOKEN:-${OPENCLAW_GATEWAY_TOKEN}}"
      # One-shot pairing token; consumed on the very first handshake to
      # auto-approve Seren's Ed25519 identity. Leave unset after the device
      # is paired (harmless if left).
      OpenClaw__BootstrapToken: "${OPENCLAW_BOOTSTRAP_TOKEN:-}"
      # Persistent device identity — stored in the seren_data volume so the
      # keypair survives container rebuilds.
      OpenClaw__DeviceIdentityPath: /data/seren-device-identity.json
      OpenClaw__DefaultAgentId: "${DEFAULT_AGENT_ID:-ollama/qwen3.5:cloud}"
      Seren__Characters__StorePath: /data/characters.json
      Auth__RequireAuthentication: "false"
      Auth__JwtSecret: "${JWT_SECRET:-change-me-in-production}"
      Seren__Cors__AllowedOrigins__0: http://localhost:9080
      Seren__RateLimit__Enabled: "false"
    ports:
      - "5080:5000"
    volumes:
      - seren_data:/data
    depends_on:
      openclaw:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --spider http://localhost:5000/health/live >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Seren Web (Vue 3 + nginx) — UI served on port 9080.
  # ---------------------------------------------------------------------------
  seren-web:
    build:
      context: ./src/ui
      dockerfile: apps/seren-web/Dockerfile
    ports:
      - "9080:80"
    depends_on:
      - seren-api
    restart: unless-stopped

volumes:
  seren_data:
  openclaw_state:
