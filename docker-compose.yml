# =============================================================================
# docker-compose.yml — Seren full stack (OpenClaw + Hub API + Web UI)
# =============================================================================
# Usage:
#   cp .env.example .env    # fill in OPENCLAW_GATEWAY_TOKEN and optional LLM keys
#   docker compose up -d --build
#
# All three services start together. OpenClaw owns the LLM transcripts;
# Seren is a thin multi-surface coordinator on top of it. Reload-safe:
# the `seren_data` and `openclaw_workspace` volumes keep `characters.json`
# and session transcripts across `docker compose down` (without `-v`).
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # One-shot init: Docker named volumes are owned by root:root on creation,
  # but OpenClaw runs as uid 1000 (node user). Chown the state volume before
  # openclaw boots so it can create `agents/`, `workspace/`, `canvas/`, etc.
  # ---------------------------------------------------------------------------
  openclaw-init:
    image: busybox:latest
    # Chown the state volume (openclaw runs as uid 1000). The volume now
    # also stores OpenClaw's config (the host bind-mount of openclaw.json
    # was removed once Seren stopped writing it directly — the gateway
    # owns its own config under /home/node/.openclaw).
    command:
      - "sh"
      - "-c"
      - |
        chown -R 1000:1000 /state \
          && chmod -R u+rwX /state \
          && chmod o+x /state \
          && mkdir -p /state/workspace \
          && chmod 777 /state/workspace
    volumes:
      - openclaw_state:/state
    restart: "no"

  # ---------------------------------------------------------------------------
  # OpenClaw Gateway — owns LLM routing, chat history and agent lifecycle.
  # ---------------------------------------------------------------------------
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest   # pin to a specific tag in prod (e.g. :2026.2.26)
    environment:
      OPENCLAW_GATEWAY_PORT: "18789"
      OPENCLAW_GATEWAY_TOKEN: "${OPENCLAW_GATEWAY_TOKEN:?set OPENCLAW_GATEWAY_TOKEN in .env}"
      # Config + state both live under /home/node/.openclaw, the writable
      # named volume owned by the node user (uid 1000). The gateway owns
      # its own config now that Seren mutates it via the `config.patch`
      # WebSocket RPC instead of direct file writes.
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_DEFAULT_MODEL: "${OPENCLAW_DEFAULT_MODEL:-ollama/seren-qwen}"
      # Provider credentials — leave blank in .env to leave a provider dormant.
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    ports:
      - "18789:18789"
    volumes:
      # Single source of truth for OpenClaw config + state — kept in a
      # named volume so OpenClaw's atomic writes (config.patch, plugin
      # auto-enable, etc.) work without fighting a host bind-mount, and
      # so the config persists across container rebuilds.
      - openclaw_state:/home/node/.openclaw
    depends_on:
      openclaw-init:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "node -e \"require('http').get('http://localhost:18789/v1/models',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 15s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Seren Hub API (.NET 10) — WebSocket hub, /api endpoints, character store.
  # ---------------------------------------------------------------------------
  seren-api:
    build:
      context: .                         # repo root — Dockerfile expects this
      dockerfile: src/server/Seren.Server.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      OpenClaw__BaseUrl: http://openclaw:18789
      OpenClaw__AuthToken: "${OPENCLAW_AUTH_TOKEN:-${OPENCLAW_GATEWAY_TOKEN}}"
      # One-shot pairing token; consumed on the very first handshake to
      # auto-approve Seren's Ed25519 identity. Leave unset after the device
      # is paired (harmless if left).
      OpenClaw__BootstrapToken: "${OPENCLAW_BOOTSTRAP_TOKEN:-}"
      # Persistent device identity — stored in the seren_data volume so the
      # keypair survives container rebuilds.
      OpenClaw__DeviceIdentityPath: /data/seren-device-identity.json
      OpenClaw__DefaultAgentId: "${DEFAULT_AGENT_ID:-ollama/seren-qwen}"
      # OpenClaw workspace directory (mounted rw below). When non-empty,
      # Seren rewrites IDENTITY.md + SOUL.md here on character activation
      # so the active persona drives the LLM on the next chat.send.
      OpenClaw__WorkspacePath: /openclaw-state/workspace
      Seren__Characters__StorePath: /data/characters.json
      Auth__RequireAuthentication: "false"
      Auth__JwtSecret: "${JWT_SECRET:-change-me-in-production}"
      Seren__Cors__AllowedOrigins__0: http://localhost:9080
      Seren__RateLimit__Enabled: "false"
      # Chat attachments travel inline as base64 in the WebSocket envelope
      # (5 MB max per attachment, 20 MB total, so ~27 MB base64 + overhead).
      # Override with a larger value only if you raise AttachmentConstraints
      # server-side in lockstep.
      Seren__WebSocket__MaxMessageSize: "26214400"
    extra_hosts:
      # Kept so future Seren-side outbound calls can reach the host on
      # Linux via `host.docker.internal` (Mac/Windows resolve this for
      # free). Mirrors the mapping on the openclaw service.
      - "host.docker.internal:host-gateway"
    ports:
      - "5080:5000"
    volumes:
      - seren_data:/data
      # Share the OpenClaw state volume (rw) so Seren can rewrite the
      # workspace persona files (IDENTITY.md + SOUL.md) on character
      # activation. OpenClaw re-reads these files on every chat.send
      # via mtime-based cache invalidation — no restart needed.
      # NOTE: persona feature is on standby (UI tab shows "Coming soon");
      # this mount can be removed once the workspace writer is migrated to
      # OpenClaw's `agents.files.set` RPC.
      - openclaw_state:/openclaw-state
    depends_on:
      openclaw:
        condition: service_healthy
      openclaw-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5000/health/live >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Seren Web (Vue 3 + nginx) — UI served on port 9080.
  # ---------------------------------------------------------------------------
  seren-web:
    build:
      context: ./src/ui
      dockerfile: apps/seren-web/Dockerfile
    ports:
      - "9080:80"
    depends_on:
      - seren-api
    restart: unless-stopped

volumes:
  seren_data:
  openclaw_state:
