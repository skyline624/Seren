# =============================================================================
# docker-compose.yml — Seren full stack (OpenClaw + Hub API + Web UI)
# =============================================================================
# Usage:
#   cp .env.example .env    # fill in OPENCLAW_GATEWAY_TOKEN and optional LLM keys
#   docker compose up -d --build
#
# All three services start together. OpenClaw owns the LLM transcripts;
# Seren is a thin multi-surface coordinator on top of it. Reload-safe:
# the `seren_data` and `openclaw_workspace` volumes keep `characters.json`
# and session transcripts across `docker compose down` (without `-v`).
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # One-shot init: Docker named volumes are owned by root:root on creation,
  # but OpenClaw runs as uid 1000 (node user). Chown the state volume before
  # openclaw boots so it can create `agents/`, `workspace/`, `canvas/`, etc.
  # ---------------------------------------------------------------------------
  openclaw-init:
    image: busybox:latest
    # Chown the state volume (openclaw runs as uid 1000). Also chmod the
    # bind-mounted openclaw.json so both openclaw (1000) and seren-api
    # (999 / appuser) can write it — Seren's POST /api/models/apply
    # rewrites `agents.defaults.model.primary` in-place before restarting
    # the gateway. 664 on the host is enough for openclaw to read; the
    # explicit chmod here (666 on the container path) covers seren-api's
    # write access without forcing the repo file into 666 on disk.
    command:
      - "sh"
      - "-c"
      - "chown -R 1000:1000 /state && chmod -R u+rwX /state && chmod 666 /config/openclaw.json"
    volumes:
      - openclaw_state:/state
      - ./ops/openclaw/openclaw.json:/config/openclaw.json
    restart: "no"

  # ---------------------------------------------------------------------------
  # OpenClaw Gateway — owns LLM routing, chat history and agent lifecycle.
  # ---------------------------------------------------------------------------
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest   # pin to a specific tag in prod (e.g. :2026.2.26)
    environment:
      OPENCLAW_GATEWAY_PORT: "18789"
      OPENCLAW_GATEWAY_TOKEN: "${OPENCLAW_GATEWAY_TOKEN:?set OPENCLAW_GATEWAY_TOKEN in .env}"
      # Config lives at a stable read-only path; state (canvas, seed writes,
      # session cache) goes under /home/node/.openclaw which is a writable
      # named volume owned by the node user (uid 1000).
      OPENCLAW_CONFIG_PATH: /etc/openclaw/openclaw.json
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_DEFAULT_MODEL: "${OPENCLAW_DEFAULT_MODEL:-ollama/seren-qwen}"
      # Provider credentials — leave blank in .env to leave a provider dormant.
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    ports:
      - "18789:18789"
    volumes:
      # Read-write so Seren's POST /api/models/apply can rewrite
      # `agents.defaults.model.primary` before triggering a gateway restart.
      # If OpenClaw itself gains write-capable admin flows later, keep this
      # rw-mount consistent across both services.
      - ./ops/openclaw/openclaw.json:/etc/openclaw/openclaw.json
      - openclaw_state:/home/node/.openclaw
    depends_on:
      openclaw-init:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "node -e \"require('http').get('http://localhost:18789/v1/models',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 15s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Seren Hub API (.NET 10) — WebSocket hub, /api endpoints, character store.
  # ---------------------------------------------------------------------------
  seren-api:
    build:
      context: .                         # repo root — Dockerfile expects this
      dockerfile: src/server/Seren.Server.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      OpenClaw__BaseUrl: http://openclaw:18789
      OpenClaw__AuthToken: "${OPENCLAW_AUTH_TOKEN:-${OPENCLAW_GATEWAY_TOKEN}}"
      # One-shot pairing token; consumed on the very first handshake to
      # auto-approve Seren's Ed25519 identity. Leave unset after the device
      # is paired (harmless if left).
      OpenClaw__BootstrapToken: "${OPENCLAW_BOOTSTRAP_TOKEN:-}"
      # Persistent device identity — stored in the seren_data volume so the
      # keypair survives container rebuilds.
      OpenClaw__DeviceIdentityPath: /data/seren-device-identity.json
      OpenClaw__DefaultAgentId: "${DEFAULT_AGENT_ID:-ollama/seren-qwen}"
      # Path to OpenClaw's config file, mounted below. Seren's
      # POST /api/models/apply rewrites `agents.defaults.model.primary`
      # here then SIGUSR1-restarts the gateway so the new default takes
      # effect on the next chat.
      OpenClaw__ConfigFilePath: /etc/openclaw/openclaw.json
      Seren__Characters__StorePath: /data/characters.json
      Auth__RequireAuthentication: "false"
      Auth__JwtSecret: "${JWT_SECRET:-change-me-in-production}"
      Seren__Cors__AllowedOrigins__0: http://localhost:9080
      Seren__RateLimit__Enabled: "false"
    extra_hosts:
      # Kept so future Seren-side outbound calls can reach the host on
      # Linux via `host.docker.internal` (Mac/Windows resolve this for
      # free). Mirrors the mapping on the openclaw service.
      - "host.docker.internal:host-gateway"
    ports:
      - "5080:5000"
    volumes:
      - seren_data:/data
      # Same openclaw.json mount as the openclaw service — Seren's
      # /api/models/apply endpoint needs write access to pin the default
      # model before triggering a gateway restart.
      - ./ops/openclaw/openclaw.json:/etc/openclaw/openclaw.json
    depends_on:
      openclaw:
        condition: service_healthy
      openclaw-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --spider http://localhost:5000/health/live >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Seren Web (Vue 3 + nginx) — UI served on port 9080.
  # ---------------------------------------------------------------------------
  seren-web:
    build:
      context: ./src/ui
      dockerfile: apps/seren-web/Dockerfile
    ports:
      - "9080:80"
    depends_on:
      - seren-api
    restart: unless-stopped

volumes:
  seren_data:
  openclaw_state:
